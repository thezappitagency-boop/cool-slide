<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Skew Slider</title>
    <link rel="stylesheet" href="css/skew-slider.css">
</head>
<!--
    body.loading hides the slider until images are preloaded.
    The page is now scrollable — content above/below is just demo filler;
    replace or remove as needed.
-->
<body class="loading">

<!-- ═══════════════════════════════════════════════════
     DEMO SECTION ABOVE (replace with your real content)
     ═══════════════════════════════════════════════════ -->
<section class="demo-section demo-section--top">
    <p>Scroll down to enter the slider &darr;</p>
</section>


<!-- ═══════════════════════════════════════════════════
     SKEW SLIDER
     — pins when it hits the top of the viewport
     — scrolls through all 5 slides
     — releases to continue scrolling the page

     To edit slides: change background-image URL,
     category <span>, and <h4> title lines.
     ═══════════════════════════════════════════════════ -->
<div class="skew-slider-area">

    <!-- Slides -->
    <div class="skew-slider-wrap">

        <!-- Slide 1 -->
        <div class="skew-slider-item slide">
            <div class="slide__img"
                 style="background-image: url('https://picsum.photos/seed/csl-arch/1920/1080')">
            </div>
            <div class="skew-slider-content">
                <span>Digital Platform</span>
                <h4><a href="#">Simple<br>Logistics</a></h4>
            </div>
        </div>

        <!-- Slide 2 -->
        <div class="skew-slider-item slide">
            <div class="slide__img"
                 style="background-image: url('https://picsum.photos/seed/csl-city/1920/1080')">
            </div>
            <div class="skew-slider-content">
                <span>Digital Platform</span>
                <h4><a href="#">Smart<br>Platform</a></h4>
            </div>
        </div>

        <!-- Slide 3 -->
        <div class="skew-slider-item slide">
            <div class="slide__img"
                 style="background-image: url('https://picsum.photos/seed/csl-interior/1920/1080')">
            </div>
            <div class="skew-slider-content">
                <span>Branding</span>
                <h4><a href="#">Royal<br>Benz</a></h4>
            </div>
        </div>

        <!-- Slide 4 -->
        <div class="skew-slider-item slide">
            <div class="slide__img"
                 style="background-image: url('https://picsum.photos/seed/csl-forest/1920/1080')">
            </div>
            <div class="skew-slider-content">
                <span>Digital Platform</span>
                <h4><a href="#">World's<br>Relays</a></h4>
            </div>
        </div>

        <!-- Slide 5 -->
        <div class="skew-slider-item slide">
            <div class="slide__img"
                 style="background-image: url('https://picsum.photos/seed/csl-abstract/1920/1080')">
            </div>
            <div class="skew-slider-content">
                <span>Design</span>
                <h4><a href="#">Bright<br>Captive</a></h4>
            </div>
        </div>

    </div><!-- /.skew-slider-wrap -->

    <!-- Copyright / CTA (top centre) -->
    <div class="tp-portfolio-slider__copyright">
        <p>Have a project in mind? <a href="#">Let's Talk.</a></p>
    </div>

    <!-- Social links (left, reads bottom-to-top) -->
    <div class="tp-portfolio-slider__social">
        <a href="#">Fb</a>
        <a href="#">In</a>
        <a href="#">Be</a>
    </div>

    <!-- Prev / Next arrows (bottom) -->
    <div class="skew-slider-arrow slides-nav">
        <button class="skew-slider-prev d-flex align-items-center">
            <span class="icon-1">
                <svg width="8" height="14" viewBox="0 0 8 14" fill="none"
                     xmlns="http://www.w3.org/2000/svg">
                    <path d="M7 1L1 7L7 13" stroke="white" stroke-width="2"
                          stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </span>
            <span class="slider-nav-text">Prev</span>
        </button>
        <button class="skew-slider-next d-flex align-items-center">
            <span class="slider-nav-text">Next</span>
            <span class="icon-2">
                <svg width="8" height="14" viewBox="0 0 8 14" fill="none"
                     xmlns="http://www.w3.org/2000/svg">
                    <path d="M1 13L7 7L1 1" stroke="white" stroke-width="2"
                          stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </span>
        </button>
    </div>

    <!-- Slide counter (right, with decorative lines) -->
    <div class="slides-numbers-wrap">
        <div class="slides-numbers">
            <span class="active text-1">01</span>
            <span class="text-2">/</span>
            <span class="text-3">05</span>
        </div>
    </div>

</div><!-- /.skew-slider-area -->


<!-- ═══════════════════════════════════════════════════
     DEMO SECTION BELOW (replace with your real content)
     ═══════════════════════════════════════════════════ -->
<section class="demo-section demo-section--bottom">
    <p>Slider released &uarr; — rest of page continues here.</p>
</section>


<!-- ═══════════════════════════════════════════════════
     Scripts  (order matters)
     ═══════════════════════════════════════════════════ -->
<!-- GSAP core (free) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<!-- ScrollTrigger — handles the pin + scroll-to-slide logic (free) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<!-- imagesLoaded — waits for background images before revealing slider -->
<script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>
<!-- Slider logic -->
<script src="js/skew-slider-bundle.js"></script>

</body>
</html>
